<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ModernUI - Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">ModernUI</a>
  </div>
</nav>

<section class="py-5">
<div class="container">
<div class="row justify-content-center">

<div class="col-md-6">
<div class="card shadow-lg border-0">
<div class="card-body p-4">

<h3 class="text-center fw-bold mb-4">Get In Touch</h3>

<form class="needs-validation" novalidate>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" required>
<div class="invalid-feedback">Please enter your name.</div>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" required>
<div class="invalid-feedback">Please enter valid email.</div>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4" required></textarea>
<div class="invalid-feedback">Message cannot be empty.</div>
</div>

<button class="btn btn-primary w-100">Send Message</button>

</form>

</div>
</div>
</div>

</div>
</div>
</section>

<footer class="bg-dark text-white text-center py-3">
© 2026 ModernUI | Internship Project
</footer>

<script>
(() => {
'use strict'
const forms = document.querySelectorAll('.needs-validation')
Array.from(forms).forEach(form => {
form.addEventListener('submit', event => {
if (!form.checkValidity()) {
event.preventDefault()
event.stopPropagation()
}
form.classList.add('was-validated')
}, false)
})
})()
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
